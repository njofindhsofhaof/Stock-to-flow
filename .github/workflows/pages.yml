name: Build and deploy dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install data dependencies
        run: pip install -r requirements-pages.txt

      - name: Update market data
        run: python update_market_data.py

      - name: Commit updated market data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market_data.js market_history.json streak_data.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git pull --rebase origin main
          git commit -m "chore: update market data $(date -u '+%Y-%m-%d')"
          git push origin main

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
